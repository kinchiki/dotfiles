# tmux起動時のシェルをzshにする
#set-option -g default-shell /usr/local/bin/zsh
set-option -g default-shell /opt/homebrew/bin/zsh

# tmuxを256色表示できるようにする
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

# prefixキーをC-gに変更
set -g prefix C-g

# C-bのキーバインドを解除
# unbind C-b

# ペイン最大化を無効にする（よく押し間違える）
unbind z

# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "copy-mode -e" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "copy-mode -e" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode'"
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# スクロールバッファサイズ
set-option -g history-limit 50000

# Alt+カーソルキーでペインサイズ変更
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5

# ステータスバーをトップに配置する
set-option -g status-position top

# 左: ウィンドウ番号ペイン番号とカレントディレクトリ
# 中央: ウィンドウ一覧
set-option -g status-format[0] '#[align=left][W#{window_index}:P#{pane_index}] #(echo "#{pane_current_path}" | sed "s|$HOME|~|") #[align=centre]#{W:#{E:window-status-format},#{E:window-status-current-format}}'
# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 1

# センタライズ（主にウィンドウ番号など）
set-option -g status-justify centre

# ステータスバーの色を設定する
set-option -g status-bg "colour238"

# status line の文字色を指定する。
set-option -g status-fg "colour255"

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# | でペインを縦分割する
# bind | split-window -h

# - でペインを縦分割する
# bind - split-window -v

# ペインをカレントディレクトリで開く
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# 番号基準値を変更
# set-option -g base-index 1

# コピーモードを設定する
# コピーモードでvimキーバインドを使う
setw -g mode-keys vi

# 'v' で選択を始める
bind -T copy-mode-vi v send -X begin-selection

# 'V' で行選択
bind -T copy-mode-vi V send -X select-line

# 'C-v' で矩形選択
bind -T copy-mode-vi C-v send -X rectangle-toggle

# 'y' でヤンク
bind -T copy-mode-vi y send -X copy-selection

# 'Y' で行ヤンク
bind -T copy-mode-vi Y send -X copy-line

# 'C-p'でペースト
bind C-p paste-buffer


# Shift+Enter などの拡張キーを透過させる（Ghostty / kitty keyboard protocol 対応）
set -gq extended-keys on
set -as terminal-features ',xterm-256color:extkeys'

# URLの一覧表示とfzfによる検索
bind u display-popup -E "tmux capture-pane -pJ | grep -Eo 'https?://[^ ]+' | sort -u | fzf | xargs open"
